apiVersion: 1

datasources:
  # PostgreSQL datasource (for both temperature_data and temperature_alerts)
  - name: PostgreSQL-SensorDB
    type: postgres
    uid: postgres-sensor-uid
    url: ${POSTGRES_HOST}:${POSTGRES_PORT}
    database: ${POSTGRES_DATABASE}
    user: ${POSTGRES_USER}
    secureJsonData:
      password: ${POSTGRES_PASSWORD}
    jsonData:
      postgresVersion: 1600
      maxOpenConns: 10
      maxIdleConns: 10
      connMaxLifetime: 14400
      sslmode: disable
    isDefault: true
    editable: true

  # JSON API datasource (for Flask Alert API)
  # Requires: marcusolsson-json-datasource plugin
  - name: AlertAPI
    type: marcusolsson-json-datasource
    uid: alert-api-uid
    url: http://alert-api:5000
    editable: true
