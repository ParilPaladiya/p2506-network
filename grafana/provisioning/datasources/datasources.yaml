apiVersion: 1

datasources:
  # MySQL datasource (for both temperature_data and temperature_alerts) 
  - name: MySQL-SensorDB
    type: mysql
    uid: mysql-sensor-uid
    url: ${MYSQL_HOST}:3306
    database: ${MYSQL_DATABASE}
    user: ${MYSQL_USER}
    secureJsonData:
      password: ${MYSQL_PASSWORD}
    jsonData:
      maxOpenConns: 10
      maxIdleConns: 10
      connMaxLifetime: 14400
      tlsAuth: false
      tlsAuthWithCACert: false
    isDefault: true
    editable: true

  # JSON API datasource (for Flask Alert API) 
  # Requires: marcusolsson-json-datasource plugin
  - name: AlertAPI
    type: marcusolsson-json-datasource
    uid: alert-api-uid
    url: http://alert-api:5000
    editable: true
